{{ define "main" }}
  <section class="section-sm">
    <div class="container">
      
      <div class="row  justify-between">
        <div class="mb:md-0 md:order-2 md:col-5 mb-6">
          {{ partial "image" (dict "Src" .Params.image "Alt" "feature image" "DisplayXL" "520x" "DisplayLG" "425x" "DisplayMD" "360x") }}
        </div>
        <div class="md:order-1 md:col-7 lg:col-6">
          <h2 class="mb-8 text-center">
            {{ .Title | markdownify }}
          </h2>
          <p class="mb-8 text-lg">
            {{ .Content | markdownify }}
          </p>
          {{ with .Params.button }}
          {{ if .enable }}
            <a class="btn btn-primary mt-6" href="{{ .link | absURL }}">
              {{ .label }}
              <i class="fa-brands fa-linkedin pl-2"></i>
            </a>
          {{ end }}
        {{ end }}
      </div>
      </div>
    </div>
  </section>
{{ end }}
